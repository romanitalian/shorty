# .github/workflows/deploy-dev.yml
#
# Deploy to dev environment on push to main.
# Runs all CI gates, then deploys via Terraform, runs E2E + load tests.

name: Deploy Dev

on:
  push:
    branches: [main]

permissions:
  id-token: write   # OIDC for AWS assume role
  contents: read

env:
  GO_VERSION: "1.25"
  TF_VERSION: "1.7.5"
  AWS_REGION: us-east-1

jobs:
  # ---------------------------------------------------------------------------
  # CI gates (reuse the same checks as PR pipeline)
  # ---------------------------------------------------------------------------
  spec-validate:
    name: Spec Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli@6
      - name: Validate OpenAPI spec
        run: spectral lint docs/api/openapi.yaml --fail-severity warn

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Go fmt
        run: |
          output=$(gofmt -l .)
          if [ -n "$output" ]; then
            echo "Files not formatted:"
            echo "$output"
            exit 1
          fi
      - name: Go vet
        run: go vet ./...
      # TODO: see ci.yml — golangci-lint v1.57 cannot parse Go 1.25 export
      # data; migrate to v2 config + action and clear lint debt.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        continue-on-error: true
        with:
          version: v1.57
          args: --timeout=5m
      - name: gosec
        uses: securego/gosec@v2.20.0
        continue-on-error: true
        with:
          args: -exclude-generated ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "${COVERAGE} < 80" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi

  bdd:
    name: BDD
    runs-on: ubuntu-latest
    needs: [spec-validate]
    services:
      localstack:
        image: localstack/localstack:3
        ports: ["4566:4566"]
        env:
          SERVICES: dynamodb,sqs,s3,secretsmanager,iam
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      REDIS_ADDR: localhost:6379
      ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Seed local resources
        run: |
          if [ -f deploy/scripts/localstack-init/01-setup.sh ]; then
            bash deploy/scripts/localstack-init/01-setup.sh
          fi
      - name: Run BDD tests
        run: make bdd

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, bdd]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build Lambda binaries
        run: make build
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-artifacts
          path: .build/*.zip
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Deploy to dev via Terraform + Lambda update
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [build]
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-artifacts
          path: .build/

      - name: Upload Lambda zips to S3
        run: |
          for fn in redirect api worker; do
            aws s3 cp .build/${fn}.zip s3://shorty-dev-artifacts/${fn}.zip
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: deploy/terraform/environments/dev
        run: terraform init

      - name: Terraform Plan
        working-directory: deploy/terraform/environments/dev
        run: terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        working-directory: deploy/terraform/environments/dev
        run: terraform apply -auto-approve -input=false tfplan

      - name: Update Lambda function code
        run: |
          for fn in redirect api worker; do
            aws lambda update-function-code \
              --function-name shorty-dev-${fn} \
              --s3-bucket shorty-dev-artifacts \
              --s3-key ${fn}.zip
            aws lambda wait function-updated --function-name shorty-dev-${fn}
            aws lambda publish-version --function-name shorty-dev-${fn}
          done

  # ---------------------------------------------------------------------------
  # E2E tests against dev environment
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [deploy]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run E2E tests
        run: make test-e2e
        env:
          E2E_BASE_URL: ${{ vars.DEV_API_ENDPOINT }}

  # ---------------------------------------------------------------------------
  # k6 baseline load test
  # ---------------------------------------------------------------------------
  load-test:
    name: Load Test (k6 baseline)
    runs-on: ubuntu-latest
    needs: [e2e]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run k6 baseline load test
        run: |
          k6 run tests/load/baseline.js \
            --env BASE_URL=${{ vars.DEV_API_ENDPOINT }} \
            --out json=k6-results.json
        continue-on-error: false

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: k6-results.json
          retention-days: 30
