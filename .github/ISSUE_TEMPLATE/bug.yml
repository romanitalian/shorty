name: Bug Report
description: Report a reproducible defect
title: "[bug]: "
labels: ["type:bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough information to reproduce the bug.
        **Security vulnerabilities** — do NOT file here. Use the Security Advisory form instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug and its impact.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Send GET /{code} with code "abc123"
        2. Expected: HTTP 302
        3. Actual: HTTP 500
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include error messages, stack traces, or log output if available.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit SHA
      placeholder: "v1.2.0 or abc1234"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "critical — data loss or security issue"
        - "high — core feature broken, no workaround"
        - "medium — feature degraded, workaround exists"
        - "low — cosmetic or minor inconvenience"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      multiple: true
      options:
        - redirect
        - api
        - worker
        - auth
        - ratelimit
        - shortener
        - observability
        - infra
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - AWS region: us-east-1
        - Lambda memory: 512 MB
        - Go version: 1.23
        - LocalStack version: 3.x
