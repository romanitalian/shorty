{{define "content"}}
<section class="mx-auto max-w-4xl px-6 py-20">
  <div class="rounded-2xl border border-slate-200 bg-white p-10 shadow-sm text-center">
    <div class="mx-auto inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-100 text-brand-700 text-2xl">🔐</div>
    <h1 class="mt-6 text-3xl font-bold text-slate-900">Personal cabinet</h1>
    <p class="mt-3 text-slate-600 max-w-xl mx-auto">
      You need to be logged in to see your links, click stats, and account settings.
    </p>
    <div class="mt-8 flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/login" class="inline-flex items-center justify-center rounded-lg bg-brand-600 px-6 py-3 text-sm font-semibold text-white hover:bg-brand-700 shadow-sm">
        Log in
      </a>
      <a href="/" class="inline-flex items-center justify-center rounded-lg border border-slate-300 px-6 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50">
        Back home
      </a>
    </div>
    <p class="mt-10 text-xs text-slate-400">
      The interactive dashboard is coming next. Until then, the
      <a href="/docs" class="underline hover:text-slate-600">API</a> is the source of truth.
    </p>
  </div>
</section>
{{end}}
