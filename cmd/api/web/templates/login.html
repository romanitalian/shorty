{{define "content"}}
<section class="mx-auto max-w-md px-6 py-20">
  <div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
    <h1 class="text-2xl font-bold text-slate-900">Welcome back</h1>
    <p class="mt-2 text-sm text-slate-600">Log in to manage your links and see analytics.</p>

    {{if .SSOEnabled}}
    <a href="{{.SSOLoginURL}}"
       class="mt-8 w-full inline-flex items-center justify-center gap-2 rounded-lg bg-slate-900 px-4 py-3 text-sm font-semibold text-white hover:bg-slate-800 transition">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.6 0 12 0zm0 4.8a4.8 4.8 0 110 9.6 4.8 4.8 0 010-9.6zm0 18.24c-4.008 0-7.548-2.04-9.624-5.136 0.048-3.192 6.408-4.944 9.624-4.944 3.216 0 9.576 1.752 9.624 4.944A11.976 11.976 0 0112 23.04z"/></svg>
      Sign in with SSO
    </a>
    <div class="my-6 flex items-center gap-3 text-xs text-slate-400">
      <div class="h-px flex-1 bg-slate-200"></div>
      OR
      <div class="h-px flex-1 bg-slate-200"></div>
    </div>
    {{else}}
    <div class="mt-8 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
      <p class="font-medium">SSO not configured</p>
      <p class="mt-1 text-amber-700">
        Set <code class="font-mono text-xs">COGNITO_LOGIN_URL</code> to enable Single Sign-On.
        Local dev below uses a mock token.
      </p>
    </div>
    {{end}}

    <form action="/login" method="post" class="mt-6 space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
        <input id="email" name="email" type="email" required
               class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 shadow-sm focus:border-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
        <input id="password" name="password" type="password" required
               class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 shadow-sm focus:border-brand-600 focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>
      <button type="submit"
              class="w-full inline-flex items-center justify-center rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-700 shadow-sm transition">
        Log in
      </button>
    </form>

    <p class="mt-6 text-center text-xs text-slate-500">
      New here? <a href="/login" class="font-medium text-brand-700 hover:underline">Create an account</a>
    </p>
  </div>
</section>
{{end}}
