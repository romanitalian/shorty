{{define "content"}}
<section class="mx-auto max-w-5xl px-6 py-20">
  <h1 class="text-4xl font-bold tracking-tight text-slate-900">Features</h1>
  <p class="mt-4 text-lg text-slate-600 max-w-2xl">
    Every feature below is already implemented, tested, and load-verified. No "coming soon" asterisks.
  </p>

  <div class="mt-12 space-y-10">
    {{range .Features}}
    <div class="flex gap-6">
      <div class="flex-shrink-0 h-12 w-12 rounded-xl bg-brand-100 text-brand-700 text-2xl inline-flex items-center justify-center">{{.Icon}}</div>
      <div>
        <h3 class="text-xl font-semibold text-slate-900">{{.Title}}</h3>
        <p class="mt-2 text-slate-600">{{.Body}}</p>
      </div>
    </div>
    {{end}}
  </div>
</section>
{{end}}
