# Shorty — Core development stack
# Usage: docker compose up -d
# With observability: docker compose -f docker-compose.yml -f docker-compose.infra.yml up -d

services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb,sqs,s3,secretsmanager,iam
      DEBUG: 0
      PERSISTENCE: 1
    volumes:
      - localstack-data:/var/lib/localstack
      - ./deploy/scripts/localstack-init.sh:/etc/localstack/init/ready.d/localstack-init.sh:ro
    healthcheck:
      test: ["CMD", "bash", "-c", "awslocal sts get-caller-identity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - shorty-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lfu
      --save ""
      --appendonly no
      --tcp-keepalive 60
      --timeout 300
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - shorty-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${APP_PORT_API:-8080}:8080"
    env_file:
      - path: .env
        required: false
    environment:
      # Run the Lambda handler as a plain HTTP server on :8080
      LOCAL_MODE: "true"
      APP_ENV: local
      APP_PORT: "8080"
      SHORT_BASE_URL: "http://localhost:8080"
      # AWS SDK → LocalStack
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      # DynamoDB table names (cmd/api reads LINKS_TABLE / CLICKS_TABLE / USERS_TABLE)
      LINKS_TABLE: shorty-links
      CLICKS_TABLE: shorty-clicks
      USERS_TABLE: shorty-users
      # Legacy aliases
      DYNAMODB_ENDPOINT: http://localstack:4566
      REDIS_ADDR: redis:6379
      SQS_ENDPOINT: http://localstack:4566
      SQS_QUEUE_URL: http://localstack:4566/000000000000/click-events.fifo
      CLICKS_QUEUE_URL: http://localstack:4566/000000000000/click-events.fifo
      # Secrets (local-only stub values)
      IP_HASH_SALT: local-dev-salt
      CSRF_SECRET: local-dev-csrf
      JWT_SECRET: local-dev-secret
      # Telemetry — left empty; enable via docker-compose.infra.yml if needed
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: shorty-api
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    working_dir: /app
    command: ["air", "-c", ".air.api.toml"]
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shorty-net

  # NOTE: cmd/redirect/main.go calls lambda.Start(handler) unconditionally and
  # has no local-HTTP fallback, so it cannot run as a standalone container. It
  # is executed by API Gateway → Lambda in AWS. Kept here for reference / future
  # local-HTTP support; start explicitly with `docker compose up redirect` only
  # after wiring LOCAL_MODE into cmd/redirect.
  redirect:
    profiles: ["lambda-only"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${APP_PORT_REDIRECT:-8081}:8081"
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: local
      APP_PORT: "8081"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      LINKS_TABLE: shorty-links
      CLICKS_TABLE: shorty-clicks
      USERS_TABLE: shorty-users
      DYNAMODB_ENDPOINT: http://localstack:4566
      REDIS_ADDR: redis:6379
      SQS_ENDPOINT: http://localstack:4566
      CLICKS_QUEUE_URL: http://localstack:4566/000000000000/click-events.fifo
      IP_HASH_SALT: local-dev-salt
      CSRF_SECRET: local-dev-csrf
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: shorty-redirect
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    working_dir: /app
    command: ["air", "-c", ".air.redirect.toml"]
    depends_on:
      localstack:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shorty-net

volumes:
  localstack-data:
  go-mod-cache:
  go-build-cache:

networks:
  shorty-net:
    driver: bridge
