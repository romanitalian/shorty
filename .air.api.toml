# Air hot-reload config for API service
# Docs: https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/api"
  cmd = "go build -o ./tmp/api ./cmd/api"
  delay = 1000
  exclude_dir = ["tmp", "vendor", ".git", "node_modules", "tests", "docs", "deploy", "config"]
  exclude_file = ["_test.go"]
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "APP_PORT=8080 ./tmp/api"
  include_dir = ["cmd/api", "internal"]
  include_ext = ["go", "toml", "yaml"]
  kill_delay = "0s"
  log = "build-errors-api.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
